<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>プロフィール設定</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main class="phone">

        <header class="page-header">
            <h1>プロフィール設定</h1>
            <p>ニックネームやプロフィールを設定しましょう。</p>
        </header>

        <section class="profile-form">

            <div class="input-group">
                <label for="nickname">ニックネーム</label>

                <input
                    type="text"
                    id="nickname"
                    maxlength="20"
                    placeholder="ニックネームを入力">
            </div>

            <div class="input-group">
                <label for="age">年齢</label>

                <input
                    type="number"
                    id="age"
                    min="0"
                    max="120"
                    placeholder="例：20">
            </div>

            <div class="input-group">

                <label>好きなこと（最大5つ）</label>

                <div id="interestList" class="interest-list">
                    <!-- JavaScriptで生成 -->
                </div>

                <p class="description">
                    すれ違いプロフィールにだけ使います。DOOH側へ送る表示データには含めません。
                </p>

            </div>

            <div class="input-group">

                <label>今のひとこと（最大3つ）</label>

                <div id="selectedWords" class="selected-words">

                    <p class="placeholder">
                        まだ選択されていません
                    </p>

                </div>

                <button
                    type="button"
                    class="open-modal-button"
                    id="openWordModal">

                    今のひとことを選択

                </button>

                <p class="description">
                    DOOHでは選択した3つの中からランダムで1つ表示されます。
                </p>

            </div>

        </section>

        <footer class="page-footer">

            <button class="next-button" onclick="goToAvatar()">
               次へ
            </button>

        </footer>

    </main>

    <!-- モーダル -->

    <div id="wordModal" class="modal">

        <div class="modal-content">

            <div class="modal-header">

                <h2>今のひとこと</h2>

                <button
                    id="closeModal"
                    class="close-button">

                    ×

                </button>

            </div>

            <p class="modal-description">

                最大3つまで選択できます。

            </p>

            <div id="wordList">

                <!-- JavaScriptで生成 -->

            </div>

        </div>

    </div>

    <script src="app-config.js"></script>
    <script src="api-client.js"></script>
    <script src="api.js"></script>
    <script src="script.js"></script>

</body>

</html>
